<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2332;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b894;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#00d4aa" opacity="0.08"/>
  <circle cx="1100" cy="500" r="200" fill="#00d4aa" opacity="0.06"/>

  <!-- Logo/Icon area -->
  <rect x="50" y="50" width="100" height="100" rx="8" fill="#1a2332" stroke="#00d4aa" stroke-width="2"/>
  <text x="100" y="115" font-family="monospace" font-size="60" font-weight="bold" fill="#00d4aa" text-anchor="middle">C</text>

  <!-- Main heading -->
  <text x="600" y="180" font-family="Inter, sans-serif" font-size="72" font-weight="800" fill="#FFFFFF" text-anchor="middle">
    CronStream
  </text>

  <!-- Subheading -->
  <text x="600" y="280" font-family="Inter, sans-serif" font-size="48" font-weight="600" fill="#00d4aa" text-anchor="middle">
    Programmable Payroll
  </text>

  <!-- Description -->
  <text x="600" y="360" font-family="Inter, sans-serif" font-size="32" fill="#8FA9BE" text-anchor="middle">
    Milestone-Verified Payments
  </text>

  <!-- Features line -->
  <text x="600" y="450" font-family="monospace" font-size="24" fill="#5A7089" text-anchor="middle">
    GitHub • Jira • Bitbucket • Figma
  </text>

  <!-- Accent bar -->
  <rect x="200" y="520" width="800" height="4" fill="url(#accentGradient)" rx="2"/>

  <!-- CTA text -->
  <text x="600" y="590" font-family="Inter, sans-serif" font-size="28" font-weight="600" fill="#00d4aa" text-anchor="middle">
    docs.cronstream.xyz
  </text>
</svg>
